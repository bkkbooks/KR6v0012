body:
  text: 佛説水月光觀音菩薩經整理者方廣錩題解佛説水月光觀音菩薩經又名水月觀音經中國人所撰佛經作者不詳一卷本經內容為向觀音發願以求救度對研究我國觀音崇拜的流傳及其形態有一定的價值本經未為我國歷代經録所載故亦不為歷代大藏經所收現在敦煌遺書中發現一號收藏於中國天津藝術博物館編號為號整理本以天津藝術博物館藏本為底本無校本録文
