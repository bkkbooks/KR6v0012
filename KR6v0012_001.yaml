body:
  text: 爾時若有比丘比丘尼優婆塞優婆夷童男童女一切識情種種人民欲誦持念大聖觀音水月光菩薩經名者於諸眾生起慈悲愍先當從我發如是願南無大悲觀世音願我速證一切法南無大悲觀世音願我早得智慧眼南無大悲觀世音願我速度一切眾南無大悲觀世音願我早得善方便南無大悲觀世音願我速乘般若船南無大悲觀世音願我早超於苦海南無大悲觀世音願我速成戒足道南無大悲觀世音願我速會無為舍南無大悲觀世音願我已同法性身若值刀山處刀山自摧鋒或向火湯裡火湯雲消滅若遇地獄者地獄或竭枯或若向餓鬼餓鬼自飽滿或向阿修羅惡心自調伏若向畜生間得其大智慧發如是願已志心稱念我大慈大悲聖觀自在菩薩摩訶薩廣大圓滿無礙悲心陀羅尼願救法界一切苦能滿眾生於覺道錄文完附關於佛說水月光觀音菩薩經方廣錩在觀音的諸多造像中水月觀音的造像頗為常見但歷代經錄沒有記載過具有類似名稱的經典然而法國國家圖書館藏伯號背面有這樣一則題記弟子朝議郎檢校尚書工部員外郎翟奉達為亡過妻馬氏追福每齋寫經一卷標題如是第一七齋寫無常經一卷第二七齋寫水月觀音經一卷第三七齋寫咒魅經一卷第四七齋寫天請問經一卷第五七齋寫閻羅經一卷第六七齋寫護諸童子經一卷第七七齋寫多心經一卷百日齋寫盂蘭盆經一卷一年齋寫佛母經一卷三年齋寫善惡因果經一卷右件寫經功德為過往馬氏追福奉請龍天八部救苦觀世音菩薩地藏菩薩四大天王八大金剛以作證盟一一領受福田往生樂處遇善知識一心供養由於伯號正面所抄的正是盂蘭盆經佛母經善惡因果經也由於該遺書與敦煌藏經洞所出其他翟奉達手書文獻筆跡相同說明本號是當時翟奉達所寫用於百日齋一年齋三年齋的原本從而證明上述題記所提及的水月觀音經在古代的確流傳過並曾被視為薦亡做功德的要典那麼這部經典的詳情如何與水月觀音的造像是否有關係由於經典本身下落不明這些問題自然無從回答年劉國展李桂英發表天津市藝術博物館藏敦煌遺書目錄其中有佛說無常經等四種一條根據目錄該卷原題簽為佛說無常經等七卷為亡母追福每齋一卷首存尾殘現存經四種佛說無常經佛說水月光觀音菩薩經佛說咒魅經佛說天請問經每種經後均有題記如第一部佛說無常經之題記為顯德五年歲次戊午三月一日夜家母阿婆馬氏身故至七日是開七齋夫校檢尚書工部員外郎翟奉達憶念敬寫無常經一卷敬畫寶髻如來一鋪每七至三週年每齋寫經一卷追福願阿娘託影神遊往生好處勿落三塗之災永充供養佛說水月光觀音菩薩經之題記為十四日二七齋追福供養願神生淨土莫落三塗之難馬氏承受福田這一資料與伯號相互印證說明所謂佛說水月光觀音菩薩經正是我們關心已久的水月觀音經大海撈針竟然得獲欣喜莫名從上述資料我們還可以知道當時共抄寫經典十種分為兩卷一卷為從一七至七七所抄的七種即今天津藝術博物館藏本可惜的是後三種經典殘失一卷為百日週年三年齋所抄的三種即今法國藏本此處所錄的水月觀音經不僅三分不具足而且從其基本形態來說也與一般的佛經有較大的差異更像是發願功德文然而竟以經命名其為中國人所撰偽經自不待言這或許說明部分偽經的產生與功德文有著密切的關係這是一個值得研究的問題從本經內容來看它顯然是當時普遍流傳的觀世音崇拜的產物從南北朝以來觀世音崇拜成為我國民間佛教信仰性佛教的主要形態之一流韻深遠值得引起研究者的注意本經被翟奉達選為薦亡追福的經典之一這對我們研究五代時敦煌的喪葬儀禮也有一定的價值翟奉達是五代時敦煌的著名人物之一敦煌遺書中現保留有多種他的著作在當時的敦煌他大約可以算是一個大知識份子了而被這樣一個知識份子選為薦亡追福的十部經典卻有一半以上為疑偽經這不能不引起我們對疑偽經在我國佛教中的實際作用與地位的充分重視還有翟奉達為什麼要選這樣十部經典除了篇幅比較短小便於抄寫之外是否還有別的什麼原因這十部經典的排序又有什麼深意是否也反映了當時的喪葬習俗或者凝聚了某種思想觀念凡此種種想必都會引起研究者的濃厚興趣我們知道水月觀音的形像一般為觀音坐在大海中岩石之上垂左足右足豎膝與左足相叉鉤面部微仰作思惟之相這一形像是唐代著名畫家周窗首創的歷代名畫記稱周窗的畫衣裳勁簡彩色柔麗菩薩端嚴妙創水月之體他在長安勝光寺塔東南院畫的水月觀音菩薩掩障稱頌一時他所畫的各種佛教題材的畫為後人模仿稱為周家樣本經雖然名為水月觀音經或水月光觀音菩薩經但從經文內容看卻與水月觀音的形像毫無關係或者因為當時水月觀音的形像已經非常普遍水月觀音已經成為觀音菩薩的一個非常普通的名稱所以人們把這一明明與水月觀音之形像毫無關係的觀音崇拜經典也冠以水月之名
